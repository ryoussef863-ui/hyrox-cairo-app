<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff4d00">
<link rel="manifest" href="manifest.json">
<title>HYROX Cairo</title>
<style>
:root {
  --orange: #ff4d00; --dark: #0a0a0a; --card: #141414; --card2: #1a1a1a; --card3: #222;
  --text: #f0f0f0; --text2: #888; --green: #00c853; --blue: #2979ff; --yellow: #ffc107;
  --red: #ff3d00; --purple: #ce93d8;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--text);
  min-height:100dvh;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(70px + var(--safe-bottom))}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);
  display:flex;justify-content:space-around;padding:8px 0 calc(8px + var(--safe-bottom));
  border-top:1px solid #1e1e1e;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
  color:var(--text2);font-size:10px;font-weight:600;padding:4px 12px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--orange)}
.nav-btn svg{width:22px;height:22px}

/* PAGES */
.page{display:none;padding:16px;padding-bottom:20px}
.page.active{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* HERO */
.hero{background:linear-gradient(135deg,#1a0800 0%,#0a0a0a 60%,#00100a 100%);border-radius:20px;
  padding:22px;margin-bottom:14px;border:1px solid #1e1e1e;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,77,0,.12) 0%,transparent 70%)}
.hero-label{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:2px;text-transform:uppercase}
.hero-title{font-size:26px;font-weight:900;margin:6px 0 3px;line-height:1.1}
.hero-sub{font-size:13px;color:var(--text2)}
.countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.countdown-item{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center;border:1px solid #1e1e1e}
.countdown-num{font-size:22px;font-weight:900;color:var(--orange)}
.countdown-label{font-size:9px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* FOCUS CARD */
.focus-card{background:linear-gradient(135deg,rgba(255,77,0,.07),var(--card));border-radius:14px;
  padding:14px 16px;margin-bottom:12px;border:1px solid rgba(255,77,0,.15)}
.focus-label{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.focus-text{font-size:14px;font-weight:600;line-height:1.55;color:var(--text)}

/* TODAY CARD */
.today-card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:10px;
  border:1px solid #1e1e1e;cursor:pointer;transition:border-color .2s}
.today-card:active{border-color:var(--orange)}
.phase-tag{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase}
.today-day{font-size:21px;font-weight:800;margin:5px 0 3px}
.today-type{font-size:13px;color:var(--text2);margin-bottom:10px}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-rest{background:rgba(41,121,255,.12);color:var(--blue)}
.badge-strength{background:rgba(255,77,0,.12);color:var(--orange)}
.badge-run{background:rgba(0,200,83,.12);color:var(--green)}
.badge-hybrid{background:rgba(255,193,7,.12);color:var(--yellow)}
.badge-mobility{background:rgba(206,147,216,.12);color:var(--purple)}
.badge-sim{background:rgba(255,61,0,.12);color:var(--red)}
.badge-race{background:rgba(255,77,0,.25);color:#fff;border:1px solid var(--orange)}
.badge-athlete{background:rgba(41,121,255,.12);color:var(--blue)}

/* MOTIVATION */
.motivation-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #1e1e1e}
.motivation-quote{font-size:14px;font-weight:600;font-style:italic;line-height:1.55;margin-bottom:6px}
.motivation-attr{font-size:11px;color:var(--text2)}

/* WORKOUT DETAIL */
.workout-block{background:var(--card);border-radius:13px;padding:14px;margin-bottom:10px;border:1px solid #1e1e1e}
.workout-block-title{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.exercise{padding:9px 0;border-bottom:1px solid #191919;font-size:13.5px;line-height:1.55}
.exercise:last-child{border-bottom:none}
.exercise-detail{font-size:11.5px;color:var(--text2);margin-top:2px}
.focus-banner{background:linear-gradient(135deg,rgba(255,77,0,.1),rgba(255,77,0,.03));
  border-left:3px solid var(--orange);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.55;font-weight:500}
.complete-btn{display:block;width:100%;padding:15px;background:var(--orange);color:#fff;border:none;
  border-radius:13px;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;margin-top:14px}
.complete-btn.done{background:var(--green)}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--orange);
  font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;margin-bottom:10px}
.section-title{font-size:19px;font-weight:800;margin:16px 0 11px}

/* PROGRAM */
.phase-selector{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.phase-selector::-webkit-scrollbar{display:none}
.phase-pill{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--card);border:1px solid #2a2a2a;
  color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.phase-pill.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.week-card{background:var(--card);border-radius:13px;padding:14px;margin-bottom:9px;border:1px solid #1e1e1e;cursor:pointer}
.week-card:active{border-color:var(--orange)}
.week-title{font-size:15px;font-weight:700;margin-bottom:3px}
.week-dates{font-size:11px;color:var(--text2);margin-bottom:9px}
.week-days{display:flex;gap:3px}
.week-day-dot{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;background:var(--card2);border:1px solid #2a2a2a;color:var(--text2)}
.week-day-dot.completed{background:var(--green);color:#fff;border-color:var(--green)}
.week-day-dot.today{border-color:var(--orange);color:var(--orange)}
.day-row{display:flex;align-items:center;padding:13px 14px;background:var(--card);border-radius:11px;
  margin-bottom:7px;border:1px solid #1e1e1e;cursor:pointer;gap:11px}
.day-row:active{border-color:var(--orange)}
.day-num{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;background:var(--card3);flex-shrink:0}
.day-num.completed{background:var(--green);color:#fff}
.day-info{flex:1;min-width:0}
.day-name{font-size:13px;font-weight:700}
.day-focus{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* GUIDE */
.guide-card{background:var(--card);border-radius:13px;padding:14px;margin-bottom:9px;border:1px solid #1e1e1e;cursor:pointer}
.guide-card:active{border-color:var(--orange)}
.guide-icon{font-size:26px;margin-bottom:7px}
.guide-card-title{font-size:15px;font-weight:700;margin-bottom:3px}
.guide-card-desc{font-size:11px;color:var(--text2)}
.guide-content h3{font-size:15px;font-weight:800;color:var(--orange);margin:14px 0 7px}
.guide-content h3:first-child{margin-top:0}
.guide-content p,.guide-content li{font-size:13.5px;line-height:1.7;color:var(--text);margin-bottom:7px}
.guide-content ul{padding-left:18px}
.guide-content .tip{background:rgba(255,77,0,.07);border-left:3px solid var(--orange);
  padding:11px 13px;border-radius:0 9px 9px 0;margin:10px 0;font-size:13px;line-height:1.6}
.guide-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
.guide-content th{background:var(--card3);padding:7px 9px;text-align:left;font-weight:700;color:var(--orange);border-bottom:1px solid #2a2a2a}
.guide-content td{padding:7px 9px;border-bottom:1px solid #191919}
.guide-content .video-ref{display:inline-flex;align-items:center;gap:5px;background:rgba(255,77,0,.1);
  border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--orange);margin:4px 2px}

/* PROGRESS */
.progress-ring{display:flex;flex-direction:column;align-items:center;margin:16px 0}
.progress-circle{width:150px;height:150px;position:relative}
.progress-circle svg{transform:rotate(-90deg)}
.progress-circle .bg{stroke:#1e1e1e}
.progress-circle .fill{stroke:var(--orange);stroke-linecap:round;transition:stroke-dashoffset .5s}
.progress-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:var(--orange)}
.progress-label{font-size:13px;color:var(--text2);margin-top:7px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}
.stat-card{background:var(--card);border-radius:13px;padding:14px;text-align:center;border:1px solid #1e1e1e}
.stat-num{font-size:26px;font-weight:900;color:var(--orange)}
.stat-label{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.benchmark-card{background:var(--card);border-radius:13px;padding:14px;margin-bottom:9px;border:1px solid #1e1e1e}
.benchmark-title{font-size:13px;font-weight:700;margin-bottom:8px}
.bench-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.bench-item label{font-size:9px;color:var(--text2);font-weight:700;text-transform:uppercase;display:block;margin-bottom:3px}
.bench-input{width:100%;padding:8px 10px;background:var(--card3);border:1px solid #2a2a2a;border-radius:9px;
  color:var(--text);font-size:13px;font-family:inherit}
.bench-input:focus{outline:none;border-color:var(--orange)}
.phase-progress-bar{height:4px;background:var(--card3);border-radius:2px;margin-top:8px;overflow:hidden}
.phase-progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .5s}
</style>
</head>
<body>

<div id="page-today" class="page active"></div>
<div id="page-program" class="page"></div>
<div id="page-guide" class="page"></div>
<div id="page-progress" class="page"></div>
<div id="workout-overlay" style="display:none" class="page"><div id="workout-detail-content"></div></div>

<nav class="nav">
  <button class="nav-btn active" data-page="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Today
  </button>
  <button class="nav-btn" data-page="program">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Program
  </button>
  <button class="nav-btn" data-page="guide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Guide
  </button>
  <button class="nav-btn" data-page="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Progress
  </button>
</nav>

<script>
// ═══ CONSTANTS ═══
const RACE_DATE = new Date(2026,10,14);
const PROGRAM_START = new Date(2026,6,7); // Jul 7 2026

const PHASES = [
  {id:1,name:"Athletic Foundation",sub:"+ HYROX Base",weeks:"1–6",dates:"Jul 7 – Aug 17",color:"#2979ff"},
  {id:2,name:"Power & Engine Build",sub:"+ Athletic Power",weeks:"7–12",dates:"Aug 18 – Sep 28",color:"#ff4d00"},
  {id:3,name:"Peak Athleticism",sub:"+ Race Prep",weeks:"13–16",dates:"Sep 29 – Oct 26",color:"#ffc107"},
  {id:4,name:"Peak & Taper",sub:"Race Week",weeks:"17–19",dates:"Oct 27 – Nov 15",color:"#ff3d00"}
];

const QUOTES = [
  {q:"Control before chaos. Power through precision.",a:"Sherif Alaa"},
  {q:"The race is won in training. Every rep today is a second saved on race day.",a:"HYROX Mindset"},
  {q:"You don't rise to the level of competition. You fall to the level of your preparation.",a:"Archilochus"},
  {q:"Jump higher. Run faster. Be more agile and explosive. That's the mission.",a:"The Complete Athlete"},
  {q:"Compromised running is where races are won or lost. Embrace the discomfort.",a:"HYROX Training"},
  {q:"Every sled push, every sprint, every burpee — deposits in your race-day account.",a:"HYROX Cairo"},
  {q:"Trust the process. Trust the taper. Race smart on the day.",a:"Your Program"},
  {q:"The person who shows up consistently beats the person who shows up intensely.",a:"Training Wisdom"},
  {q:"8 stations. 8 kilometers. 1 finish line. You are building something unstoppable.",a:"HYROX Cairo 2026"},
  {q:"This program was built for repeatability. Go heavier, jump higher, sprint harder.",a:"Sherif Alaa"},
  {q:"Pain is temporary. Your HYROX time is forever.",a:"Race Day Truth"},
  {q:"Cairo is waiting. The first-ever HYROX in Egypt, and you will be ready.",a:"Nov 14 2026"},
];

// ═══ HELPERS ═══
function weekStart(w){const d=new Date(PROGRAM_START);d.setDate(d.getDate()+(w-1)*7);return d}
function dayDate(w,di){const d=weekStart(w);d.setDate(d.getDate()+di);return d}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
// Day names derived from actual calendar (PROGRAM_START = Tue Jul 7)
function dayName(di){return dayDate(1,di).toLocaleDateString('en-US',{weekday:'long'});}
function dayNameShort(di){return dayDate(1,di).toLocaleDateString('en-US',{weekday:'narrow'});}
// Keep DAYS_S as a function too for the week dots
const DAYS_S_FN=(di)=>dayNameShort(di);

// ═══ STATE ═══
const SK='hyrox_v4';
let S=loadS();
function loadS(){
  try{
    const raw=localStorage.getItem(SK);
    // w0d0 = Tue Jul 7 = Sherif Phase 1 Day 1 — already completed
    if(!raw) return{done:{'w0d0':true},bench:{},phase:0};
    return JSON.parse(raw)||{done:{},bench:{},phase:0};
  }catch{return{done:{'w0d0':true},bench:{},phase:0}}
}
function saveS(){localStorage.setItem(SK,JSON.stringify(S))}
function dk(w,d){return`w${w}d${d}`}
function isDone(w,d){return!!S.done[dk(w,d)]}
function toggle(w,d){S.done[dk(w,d)]=!S.done[dk(w,d)];saveS()}

// ═══════════════════════════════════════════════════════
// FULL 19-WEEK INTEGRATED PROGRAM
// Week structure (Tue → Mon):
//   0=Tue  1=Wed  2=Thu  3=Fri  4=Sat  5=Sun  6=Mon
// Day logic: Lower Body | Run | Upper Body | Posterior Chain
//            | HYROX Stations | Athleticism | Rest
// ═══════════════════════════════════════════════════════

function W(title,type,badge,focus,blocks){return{title,type,badge,focus,blocks}}
function B(name,...ex){return{name,ex}}

// ─── PHASE 1: WEEKS 1–6 — ATHLETIC FOUNDATION + HYROX BASE ───────────────
// Goal: build unilateral strength, lactate threshold, and station technique.
// Sherif Phase 1 Day 1-4 form the core; HYROX sessions added on Sat.

function p1week(sqRPE, runSets, runMin, runRest, hyroxBlocks, carryM, dlRPE){
return[

// 0: Tue — LOWER BODY STRENGTH
W("Lower Body — Strength & Power","strength","strength",
  "Build unilateral leg strength and explosive hip power. Every rep here transfers to faster sled splits and stronger wall balls.",
  [B("Warm-Up — 3 rounds | 90s rest",
      "Cross Connect Forward-to-Reverse Lunge — 5/leg (controlled, full range)",
      "Hanging Knee Raises — 12 reps (core braced, no swing)",
      "Alternating Bent-Over Row — 10/arm (neutral spine, hinge position)"),
   B(`A — Superset × 3 sets | 2-3min rest between sets`,
      `Barbell Split Squat — 5/leg @ RPE ${sqRPE} | 2s hold at bottom | Build load each week`,
      "Jumping Split Squats — 5/leg | Explosive drive, soft landing, immediate reset"),
   B("B — 3 sets × 10 | 90s rest",
      "Leg Press — 10 reps @ moderate | 3-second eccentric (quad endurance = better wall balls)",
      "Walking DB Lunges — 10/leg @ RPE 6"),
   B("C — 3 × 15 paired | 60s rest",
      "Leg Extension — 15 reps",
      "Hamstring Curl — 15 reps")]),

// 1: Wed — RUNNING ONLY
W("Running — Threshold Intervals","run","run",
  "Raise lactate threshold — the single biggest predictor of HYROX run pace. Nothing else today. Protect the legs.",
  [B("Warm-Up",
      "8min easy jog (Zone 2 — fully conversational)",
      "4×60m progressive strides: 50→60→70→80% effort | Walk-back recovery between each"),
   B(`Main Set — ${runSets} × ${runMin}min @ Threshold (RPE 6-7)`,
      "Slightly uncomfortable — short phrases possible, full sentences not",
      `${runRest}min easy jog recovery between reps`,
      "Pacing rule: Rep 1 and last rep at identical effort — this discipline wins HYROX"),
   B("Cool-Down",
      "5min easy jog → 2min walk",
      "Calf stretch 60s/side | Hip flexor lunge stretch 60s/side | Standing quad 45s/side")]),

// 2: Thu — UPPER BODY STRENGTH + EXPLOSIVE POWER
W("Upper Body — Strength & Explosive Power","strength","strength",
  "Build pressing force and explosive power transfer. Carries directly into SkiErg drive, sled push authority, and wall ball output.",
  [B("Warm-Up — Plyometric Prep (sub-maximal intensity)",
      "Linear Pogos — 2×20 (fast ground contact, stiff ankles)",
      "Side-to-Side Pogos — 2×10/leg",
      "Alternating Pogos — 2×10/leg",
      "Single-Leg Hops — 2×15/leg (build reactive stiffness, stay tall)"),
   B("A — Strength Complex × 3 rounds | 2min rest | All 4 movements consecutive, no rest within complex",
      "Barbell Bench Press — 5 reps (heavy — build load each week)",
      "Bench Plyometric Push-Ups — 5 reps (explosive off bar, absorb landing, no pause)",
      "Medicine Ball Chest Pass — 8 reps (maximal acceleration, full arm extension)",
      "Banded Pull-Aparts — 12 reps (scapular retraction — resets upper back between pressing)"),
   B("B — 3 × 8 | 90s rest",
      "Weighted Pull-Up or Lat Pulldown — 8 reps @ RPE 7",
      "Single-Arm DB Row — 10/arm @ RPE 7"),
   B("C — 3 × 12-15 | 60s rest",
      "Incline DB Press — 12 reps",
      "Face Pulls — 15 reps (rear delt + rotator cuff health)",
      "RFE Split Squat Jumps (light, 30-40% BW) — 15/leg (keep legs conditioned)")]),

// 3: Fri — POSTERIOR CHAIN
W("Posterior Chain — Hip Hinge Power","strength","strength",
  "The deadlift builds the engine. KB swings teach explosive hip extension — the exact movement driving every sled push step.",
  [B("Warm-Up — 3 rounds",
      "Hip Bridge Long Lever — 10 reps (extended leg for hamstring load)",
      "Single-Leg RDL bodyweight — 10/leg (feel the hamstring, not the lower back)",
      "Straight Arm Lat Pull (band/cable) — 10 reps (lat engagement pattern for deadlift)"),
   B(`A — Superset × 3 sets | 2-3min rest between sets`,
      `Deadlift w/ 2s Pause Below Knee — 5 reps @ RPE ${dlRPE} | Lat tension before pulling, bar stays close`,
      "Kettlebell Swings — 10 reps | Violent hip snap — this is a hinge, not a squat"),
   B("B — Accessories Circuit × 3 | 90s rest",
      "Hamstring Curl — 15 reps (slow eccentric — 3s down)",
      "Alternating Floor Press — 15/arm",
      "Oblique Cable Crunch — 15/side"),
   B("C — 3 × 15 | 60s rest",
      "DB Hammer Curl — 15 reps",
      "Triceps Pushdown — 15 reps"),
   B("Optional — if energy allows",
      "20min easy bike, ski, or row @ Zone 2 — aerobic maintenance")]),

// 4: Sat — HYROX STATION SKILLS
W("HYROX — Station Skills & Conditioning","hybrid","hybrid",
  "Train the machines. Build station-specific capacity. Race outcome is decided here, weeks before race day.",
  [B("Warm-Up",
      "8min easy SkiErg or Row (Zone 2)",
      "Hip CARs — 8/side | Shoulder CARs — 8/side | 10 Wall Ball air squats"),
   ...hyroxBlocks,
   B("Cool-Down",
      "5min light Row — flush the legs",
      "10min mobility: hip flexors, thoracic rotation, shoulders")]),

// 5: Sun — SPEED + AGILITY + STABILITY
W("Athleticism — Speed, Agility & Stability","athlete","athlete",
  "Sprint mechanics, reactive footwork, loaded carries, and hip/shoulder stability — the athletic base every station demands.",
  [B("Warm-Up — Sprint Mechanics Drills × 3 rounds",
      "A-Skip — 20 reps (exaggerated knee drive, active arm swing, stay tall)",
      "Side Shuffle — 30s (low hips, reactive, don't cross feet)",
      "Backward Run — 30s (opens hips, builds ankle stiffness)"),
   B(`Loaded Carry — 4 × ${carryM}m | 90s rest`,
      `Farmers Carry — ${carryM}m @ ~60% race weight/hand`,
      "Tall spine, packed shoulders, braced core — no lateral lean"),
   B("Hip Stability Circuit — 3 rounds | 90s rest",
      "Copenhagen Raises — 15 reps (full range, both legs loaded)",
      "KB Goblet Marches — 15/leg (upright, deliberate, no lean)",

<h3>1. SkiErg — 1000m</h3>

{icon:"💥",title:"Athleticism: Speed & Agility Drills",desc:"Pogos, sprints, A-skips, and explosive plyometrics explained",content:`
<h3>Pogos</h3>
<p>Rapid, stiff-ankle bounces — minimal ground contact time. Think of your feet as springs. Knees slightly bent, land on balls of feet, rebound immediately.</p>

<div class="tip">These train ankle stiffness and elasticity — critical for running economy on HYROX runs.</div>
<h3>A-Skip</h3>
<p>High-knee skip pattern. Drive knee up to hip height, arm opposite to leg, land on ball of foot. Focus on rhythm and posture, not speed.</p>
<h3>Shuttle Sprints</h3>
<p>Sprint to a cone (5m, 10m, or 15m), touch the ground, sprint back. This trains acceleration, deceleration, and direction change — not just top speed.</p>
<div class="tip">Stay low on the turns. Plant hard, push off explosively. Don't stand tall during direction changes.</div>
<h3>Broad Jumps</h3>
<p>Two-foot takeoff, jump as far forward as possible, land soft with knees bent. Focus on horizontal distance, not height.</p>
<h3>Depth Jumps</h3>
<p>Step off a box, land, immediately explode upward or forward. The key is minimal ground contact — the landing IS the takeoff. Used in Phase 3 only.</p>
<h3>Tuck Jumps</h3>
<p>Jump vertically, tuck knees to chest at peak. Land soft, rebound immediately. Trains reactive power and hip flexor strength.</p>
<h3>RFE Split Squat Box Jumps</h3>
<p>Rear foot elevated on a bench, front foot planted. Drive explosively through front leg to jump. This directly trains the same pattern as sled push and burpee broad jump.</p>`},

  currentPage=page; viewingWeek=null; guideOpen=null;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  const days=Math.max(0,Math.floor(diff/86400000));

    </div></div>`;

  const qi=Math.floor(now.getTime()/86400000)%QUOTES.length;
  const q=QUOTES[qi];
  html+=`<div class="motivation-card"><div class="motivation-quote">"${q.q}"</div><div class="motivation-attr">— ${q.a}</div></div>`;

  const daysSince=Math.floor((now-PROGRAM_START)/86400000);
  const cw=Math.floor(daysSince/7);
  const cd=daysSince%7;

  if(daysSince<0){
    html+=`<div class="today-card"><div class="phase-tag">PROGRAM STARTS SOON</div>
      <div class="today-day">Training begins ${fmt(PROGRAM_START)}</div>
      <div class="today-type">Review the Guide and prepare your equipment</div></div>`;

    html+=`<div class="today-card"><div class="phase-tag">PROGRAM COMPLETE</div>
      <div class="today-day">You've crossed the finish line!</div></div>`;
  } else {
    const workout=ALL_WEEKS[cw][cd];
    const phaseIdx=cw<6?0:cw<12?1:cw<16?2:3;

    html+=`<div class="focus-card"><div class="focus-label">Today's Focus</div>
      <div class="focus-text">${workout.focus}</div></div>`;
    html+=`<div class="today-card" onclick="showWorkout(${cw},${cd})">

        <div class="phase-tag">PHASE ${phaseIdx+1} — WEEK ${cw+1}</div>
        <span class="badge badge-${workout.badge}">${workout.type}</span>
      </div>
      <div class="today-day">${dayName(cd)} — ${workout.title}</div>
      <div class="today-type">${fmt(dayDate(cw+1,cd))}</div>
      <div style="margin-top:10px;font-size:13px;color:var(--text2)">${workout.blocks.slice(0,2).map(b=>b.ex[0]).join('<br>')}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--orange);font-weight:600">Tap to see full workout →</div>
      ${comp?'<div style="margin-top:10px;color:var(--green);font-weight:700;font-size:13px">✓ Completed</div>':''}
    </div>`;
    if(cd<6){
      const nw=ALL_WEEKS[cw][cd+1];
      html+=`<div style="font-size:11px;color:var(--text2);font-weight:700;margin:10px 0 6px;text-transform:uppercase;letter-spacing:1px">Tomorrow</div>
        <div class="today-card" onclick="showWorkout(${cw},${cd+1})" style="opacity:.65">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="today-day" style="font-size:15px">${dayName(cd+1)} — ${nw.title}</div>
            <span class="badge badge-${nw.badge}">${nw.type}</span>
          </div>
          <div style="font-size:12px;color:var(--orange);margin-top:6px">${nw.focus.substring(0,80)}...</div>
        </div>`;
    }
  }
  document.getElementById('page-today').innerHTML=html;
}

    <div class="workout-block" style="background:linear-gradient(135deg,rgba(255,77,0,.07),var(--card))">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="phase-tag">PHASE ${phaseIdx+1} — WEEK ${wi+1}</div>
        <span class="badge badge-${w.badge}">${w.type}</span>
      </div>
      <div style="font-size:20px;font-weight:800;margin-bottom:3px">${dayName(di)}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text2)">${w.title}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:3px">${fmt(dayDate(wi+1,di))}</div>
    </div>
    <div class="focus-banner">${w.focus}</div>`;
  w.blocks.forEach(b=>{
    html+=`<div class="workout-block"><div class="workout-block-title">${b.name}</div>
      ${b.ex.map(e=>`<div class="exercise">${e}</div>`).join('')}</div>`;
  });
  html+=`<button class="complete-btn ${comp?'done':''}" onclick="markDone(${wi},${di})">
    ${comp?'✓ COMPLETED — TAP TO UNDO':'MARK AS COMPLETE'}</button>`;

  document.getElementById('workout-detail-content').innerHTML=html;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const ov=document.getElementById('workout-overlay');
  ov.style.display='block';
  ov.classList.add('active');
  window.scrollTo(0,0);
}
function closeWorkout(){
  document.getElementById('workout-overlay').style.display='none';
  document.getElementById(`page-${currentPage}`).classList.add('active');
  renderPage(currentPage);
}
function markDone(wi,di){toggle(wi,di);showWorkout(wi,di);}

// ═══ PROGRAM ═══
function renderProgram(){
  const ph=S.phase||0;
  let html=`<div class="section-title">Program</div>
    <div class="phase-selector">${PHASES.map((p,i)=>`<div class="phase-pill ${ph===i?'active':''}" onclick="selPhase(${i})">Phase ${p.id}: ${p.name}</div>`).join('')}</div>`;

  if(viewingWeek!==null){
    const wi=viewingWeek;
    html=`<div class="section-title">Program</div>
      <div class="phase-selector">${PHASES.map((p,i)=>`<div class="phase-pill ${ph===i?'active':''}" onclick="selPhase(${i})">Phase ${p.id}: ${p.name}</div>`).join('')}</div>`;
    html+=`<button class="back-btn" onclick="viewingWeek=null;renderProgram()">← All Weeks</button>
      <div style="font-size:17px;font-weight:800;margin-bottom:3px">Week ${wi+1}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${fmt(weekStart(wi+1))} — ${fmt(dayDate(wi+1,6))}</div>`;
    ALL_WEEKS[wi].forEach((d,i)=>{
      const comp=isDone(wi,i);
      html+=`<div class="day-row" onclick="showWorkout(${wi},${i})">
        <div class="day-num ${comp?'completed':''}">${dayNameShort(i)}</div>
        <div class="day-info">
          <div class="day-name">${dayName(i)}</div>
          <div class="day-focus">${d.focus||d.title}</div>
        </div>
        <span class="badge badge-${d.badge}" style="flex-shrink:0">${d.type}</span>
        ${comp?'<span style="color:var(--green);font-size:16px;flex-shrink:0">✓</span>':''}
      </div>`;
    });
  } else {
    const startW=[0,6,12,16][ph], endW=[6,12,16,19][ph];
    const now=new Date();
    const daysSince=Math.floor((now-PROGRAM_START)/86400000);
    const cw=Math.floor(daysSince/7), cd=daysSince%7;
    for(let w=startW;w<endW;w++){
      const dones=ALL_WEEKS[w].filter((_,i)=>isDone(w,i)).length;
      html+=`<div class="week-card" onclick="openWeek(${w})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="week-title">Week ${w+1}</div>
          <div style="font-size:11px;color:var(--text2)">${dones}/7</div>
        </div>
        <div class="week-dates">${fmt(weekStart(w+1))} — ${fmt(dayDate(w+1,6))}</div>
        <div class="week-days">${Array.from({length:7},(_,i)=>{
          let cls='week-day-dot';
          if(isDone(w,i))cls+=' completed';
          else if(w===cw&&i===cd)cls+=' today';
          return`<div class="${cls}">${dayNameShort(i)}</div>`;
        }).join('')}</div>
        <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${(dones/7*100).toFixed(0)}%"></div></div>
      </div>`;
    }
  }
  document.getElementById('page-program').innerHTML=html;
}
function selPhase(i){S.phase=i;saveS();viewingWeek=null;renderProgram();}
function openWeek(w){viewingWeek=w;renderProgram();}

// ═══ GUIDE ═══
function renderGuide(){
  let html='';
  if(guideOpen!==null){
    const g=GUIDES[guideOpen];
    html=`<button class="back-btn" onclick="guideOpen=null;renderGuide()">← All Guides</button>
      <div style="font-size:19px;font-weight:800;margin-bottom:14px">${g.title}</div>
      <div class="guide-content">${g.content}</div>`;
  } else {
    html=`<div class="section-title">Guide</div>
      ${GUIDES.map((g,i)=>`<div class="guide-card" onclick="guideOpen=${i};renderGuide()">
        <div class="guide-icon">${g.icon}</div>
        <div class="guide-card-title">${g.title}</div>
        <div class="guide-card-desc">${g.desc}</div>
      </div>`).join('')}`;
  }
  document.getElementById('page-guide').innerHTML=html;
  window.scrollTo(0,0);
}

// ═══ PROGRESS ═══
function renderProgress(){
  const total=19*7, done=Object.keys(S.done).filter(k=>S.done[k]).length;
  const pct=Math.round(done/total*100);
  const C=2*Math.PI*65, off=C-(pct/100)*C;
  const now=new Date();
  const daysSince=Math.max(0,Math.floor((now-PROGRAM_START)/86400000));
  const cw=Math.min(19,Math.floor(daysSince/7)+1);
  const daysLeft=Math.max(0,Math.floor((RACE_DATE-now)/86400000));
  const streak=calcStreak();

  const phaseLabels=['Wk 6 Base','Wk 12 Power','Wk 16 Sim #1','Wk 17 Sim #2'];
  const benchKeys=[
    {key:'run2k',label:'2km Run Time Trial'},
    {key:'row1k',label:'1000m Row Time'},
    {key:'sledPush',label:'Sled Push 50m @ Race Weight'},
    {key:'sledPull',label:'Sled Pull 50m @ Race Weight'},
    {key:'wallBalls',label:'Max Unbroken Wall Balls'},
    {key:'broadJump',label:'Broad Jumps in 30s (reps)'},
    {key:'simTotal',label:'Full HYROX Sim — Total Time'},
  ];

  let html=`<div class="section-title">Progress</div>
    <div class="progress-ring">
      <div class="progress-circle">
        <svg viewBox="0 0 140 140" width="150" height="150">
          <circle class="bg" cx="70" cy="70" r="65" fill="none" stroke-width="8"/>
          <circle class="fill" cx="70" cy="70" r="65" fill="none" stroke-width="8" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div class="progress-label">${done} of ${total} sessions complete</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${cw}</div><div class="stat-label">Current Week</div></div>
      <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-label">Day Streak</div></div>
      <div class="stat-card"><div class="stat-num">${daysLeft}</div><div class="stat-label">Days to Race</div></div>
      <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Sessions Done</div></div>
    </div>
    <div class="section-title" style="font-size:15px">Benchmark Tracking</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">Record at Week 6, 12, 16, and 17 (simulations)</div>
    ${benchKeys.map(b=>{
      const v=S.bench[b.key]||{};
      return`<div class="benchmark-card"><div class="benchmark-title">${b.label}</div>
        <div class="bench-row">
          ${phaseLabels.map((l,i)=>{
            const fk=['p1','p2','p3','p4'][i];
            return`<div class="bench-item"><label>${l}</label>
              <input class="bench-input" placeholder="—" value="${v[fk]||''}"
                onchange="saveBench('${b.key}','${fk}',this.value)"></div>`;
          }).join('')}
        </div></div>`;
    }).join('')}`;

  document.getElementById('page-progress').innerHTML=html;
}
function saveBench(k,p,v){if(!S.bench[k])S.bench[k]={};S.bench[k][p]=v;saveS();}
function calcStreak(){
  const now=new Date(); let s=0;
  for(let i=0;i<133;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=Math.floor((d-PROGRAM_START)/86400000);
    if(ds<0)break;
    const w=Math.floor(ds/7),day=ds%7;
    if(w>=19)continue;
    if(isDone(w,day))s++;else if(i>0)break;
  }
  return s;
}

// ═══ INIT ═══
renderToday();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
