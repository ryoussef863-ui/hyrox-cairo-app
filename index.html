<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff4d00">
<link rel="manifest" href="manifest.json">
<title>HYROX Cairo</title>
<style>
:root {
  --orange: #ff4d00;
  --orange-glow: #ff6a2a;
  --dark: #0a0a0a;
  --card: #141414;
  --card2: #1a1a1a;
  --card3: #222;
  --text: #f0f0f0;
  --text2: #999;
  --green: #00c853;
  --blue: #2196f3;
  --yellow: #ffc107;
  --red: #ff3d00;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
  padding-bottom: calc(70px + var(--safe-bottom));
}

/* ─── NAV BAR ─── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(14,14,14,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; justify-content: space-around;
  padding: 8px 0 calc(8px + var(--safe-bottom));
  border-top: 1px solid #222;
  z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text2);
  font-size: 10px; font-weight: 600; padding: 4px 12px;
  cursor: pointer; transition: color 0.2s;
}
.nav-btn.active { color: var(--orange); }
.nav-btn svg { width: 24px; height: 24px; }

/* ─── PAGES ─── */
.page { display: none; padding: 16px; padding-bottom: 20px; }
.page.active { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ─── HERO / TODAY ─── */
.hero {
  background: linear-gradient(135deg, #1a0800 0%, #0a0a0a 50%, #001a0a 100%);
  border-radius: 20px; padding: 24px; margin-bottom: 16px;
  border: 1px solid #222;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -50%; right: -30%; width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,77,0,0.15) 0%, transparent 70%);
}
.hero-label { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; }
.hero-title { font-size: 28px; font-weight: 900; margin: 8px 0 4px; line-height: 1.1; }
.hero-sub { font-size: 14px; color: var(--text2); }
.countdown-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px;
}
.countdown-item {
  background: var(--card); border-radius: 12px; padding: 12px 8px; text-align: center;
  border: 1px solid #222;
}
.countdown-num { font-size: 24px; font-weight: 900; color: var(--orange); }
.countdown-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.today-card {
  background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 12px;
  border: 1px solid #222; cursor: pointer; transition: border-color 0.2s;
}
.today-card:active { border-color: var(--orange); }
.today-phase { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 1.5px; text-transform: uppercase; }
.today-day { font-size: 22px; font-weight: 800; margin: 6px 0 4px; }
.today-type { font-size: 14px; color: var(--text2); margin-bottom: 12px; }
.today-preview { font-size: 13px; color: var(--text2); line-height: 1.5; }

.badge {
  display: inline-block; padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-rest { background: rgba(33,150,243,0.15); color: var(--blue); }
.badge-strength { background: rgba(255,77,0,0.15); color: var(--orange); }
.badge-run { background: rgba(0,200,83,0.15); color: var(--green); }
.badge-hybrid { background: rgba(255,193,7,0.15); color: var(--yellow); }
.badge-mobility { background: rgba(156,39,176,0.15); color: #ce93d8; }
.badge-sim { background: rgba(255,61,0,0.15); color: var(--red); }
.badge-race { background: rgba(255,77,0,0.3); color: #fff; border: 1px solid var(--orange); }

/* ─── MOTIVATION ─── */
.motivation-card {
  background: linear-gradient(135deg, rgba(255,77,0,0.08) 0%, var(--card) 100%);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
  border: 1px solid rgba(255,77,0,0.2);
}
.motivation-quote { font-size: 16px; font-weight: 600; font-style: italic; line-height: 1.5; margin-bottom: 8px; }
.motivation-attr { font-size: 12px; color: var(--text2); }

/* ─── WORKOUT DETAIL ─── */
.workout-detail { padding: 16px; }
.workout-header {
  background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px;
  border: 1px solid #222;
}
.workout-block {
  background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px;
  border: 1px solid #222;
}
.workout-block-title {
  font-size: 13px; font-weight: 700; color: var(--orange); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 10px;
}
.exercise {
  padding: 10px 0; border-bottom: 1px solid #1a1a1a;
  font-size: 14px; line-height: 1.6; color: var(--text);
}
.exercise:last-child { border-bottom: none; }
.exercise-rest { font-size: 12px; color: var(--text2); margin-top: 2px; }
.exercise-note { font-size: 12px; color: var(--orange); margin-top: 2px; font-style: italic; }

.complete-btn {
  display: block; width: 100%; padding: 16px;
  background: var(--orange); color: #fff; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; margin-top: 16px; transition: all 0.2s;
}
.complete-btn:active { transform: scale(0.97); }
.complete-btn.done { background: var(--green); }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--orange);
  font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 0; margin-bottom: 12px;
}

/* ─── WEEK VIEW ─── */
.section-title { font-size: 20px; font-weight: 800; margin: 20px 0 12px; }
.phase-selector {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.phase-selector::-webkit-scrollbar { display: none; }
.phase-pill {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  background: var(--card); border: 1px solid #333; color: var(--text2);
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.phase-pill.active { background: var(--orange); color: #fff; border-color: var(--orange); }

.week-card {
  background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px;
  border: 1px solid #222; cursor: pointer; transition: border-color 0.2s;
}
.week-card:active { border-color: var(--orange); }
.week-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.week-dates { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.week-days { display: flex; gap: 4px; }
.week-day-dot {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; background: var(--card2);
  border: 1px solid #333;
}
.week-day-dot.completed { background: var(--green); color: #fff; border-color: var(--green); }
.week-day-dot.today { border-color: var(--orange); color: var(--orange); }

.day-row {
  display: flex; align-items: center; padding: 14px 16px;
  background: var(--card); border-radius: 12px; margin-bottom: 8px;
  border: 1px solid #222; cursor: pointer; transition: border-color 0.2s; gap: 12px;
}
.day-row:active { border-color: var(--orange); }
.day-num {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; background: var(--card3);
  flex-shrink: 0;
}
.day-num.completed { background: var(--green); color: #fff; }
.day-info { flex: 1; min-width: 0; }
.day-name { font-size: 14px; font-weight: 700; }
.day-desc { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-check { font-size: 18px; color: var(--green); flex-shrink: 0; }

/* ─── GUIDE SECTIONS ─── */
.guide-card {
  background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px;
  border: 1px solid #222; cursor: pointer; transition: border-color 0.2s;
}
.guide-card:active { border-color: var(--orange); }
.guide-card-icon { font-size: 28px; margin-bottom: 8px; }
.guide-card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.guide-card-desc { font-size: 12px; color: var(--text2); }

.guide-content {
  background: var(--card); border-radius: 14px; padding: 20px; margin-bottom: 12px;
  border: 1px solid #222;
}
.guide-content h3 {
  font-size: 16px; font-weight: 800; color: var(--orange); margin: 16px 0 8px;
}
.guide-content h3:first-child { margin-top: 0; }
.guide-content p, .guide-content li {
  font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 8px;
}
.guide-content ul { padding-left: 20px; }
.guide-content .tip {
  background: rgba(255,77,0,0.08); border-left: 3px solid var(--orange);
  padding: 12px 14px; border-radius: 0 10px 10px 0; margin: 12px 0;
  font-size: 13px; line-height: 1.6;
}
.guide-content table {
  width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px;
}
.guide-content th {
  background: var(--card3); padding: 8px 10px; text-align: left;
  font-weight: 700; color: var(--orange); border-bottom: 1px solid #333;
}
.guide-content td {
  padding: 8px 10px; border-bottom: 1px solid #1a1a1a; color: var(--text);
}

/* ─── PROGRESS ─── */
.progress-ring {
  display: flex; flex-direction: column; align-items: center; margin: 20px 0;
}
.progress-circle {
  width: 160px; height: 160px; position: relative;
}
.progress-circle svg { transform: rotate(-90deg); }
.progress-circle .bg { stroke: #222; }
.progress-circle .fill { stroke: var(--orange); stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
.progress-pct {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 36px; font-weight: 900; color: var(--orange);
}
.progress-label { font-size: 14px; color: var(--text2); margin-top: 8px; font-weight: 600; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
.stat-card {
  background: var(--card); border-radius: 14px; padding: 16px; text-align: center;
  border: 1px solid #222;
}
.stat-num { font-size: 28px; font-weight: 900; color: var(--orange); }
.stat-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

.benchmark-card {
  background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px;
  border: 1px solid #222;
}
.benchmark-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.benchmark-input {
  width: 100%; padding: 10px 14px; background: var(--card3); border: 1px solid #333;
  border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit;
}
.benchmark-input:focus { outline: none; border-color: var(--orange); }
.benchmark-entries { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.benchmark-tag {
  padding: 4px 10px; background: rgba(255,77,0,0.1); border-radius: 8px;
  font-size: 12px; color: var(--orange); font-weight: 600;
}
</style>
</head>
<body>

<!-- ═══════ TODAY PAGE ═══════ -->
<div id="page-today" class="page active">
  <div class="hero">
    <div class="hero-label">HYROX Cairo 2026</div>
    <div class="hero-title" id="hero-greeting"></div>
    <div class="hero-sub" id="hero-date"></div>
    <div class="countdown-grid" id="countdown"></div>
  </div>
  <div id="motivation-slot"></div>
  <div id="today-workout"></div>
</div>

<!-- ═══════ PROGRAM PAGE ═══════ -->
<div id="page-program" class="page">
  <div class="section-title">Program</div>
  <div class="phase-selector" id="phase-selector"></div>
  <div id="program-content"></div>
</div>

<!-- ═══════ GUIDE PAGE ═══════ -->
<div id="page-guide" class="page">
  <div class="section-title">Guide</div>
  <div id="guide-list"></div>
  <div id="guide-detail" style="display:none"></div>
</div>

<!-- ═══════ PROGRESS PAGE ═══════ -->
<div id="page-progress" class="page">
  <div class="section-title">Progress</div>
  <div id="progress-content"></div>
</div>

<!-- ═══════ WORKOUT DETAIL OVERLAY ═══════ -->
<div id="workout-overlay" style="display:none" class="page">
  <div id="workout-detail-content"></div>
</div>

<!-- ═══════ NAV ═══════ -->
<nav class="nav">
  <button class="nav-btn active" data-page="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Today
  </button>
  <button class="nav-btn" data-page="program">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Program
  </button>
  <button class="nav-btn" data-page="guide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Guide
  </button>
  <button class="nav-btn" data-page="progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    Progress
  </button>
</nav>

<script>
// ═══════════════════════════════════════════
//  DATA: Full 21-week program
// ═══════════════════════════════════════════
const RACE_DATE = new Date(2026, 10, 14); // Nov 14 2026
const PROGRAM_START = new Date(2026, 5, 22); // Jun 22 2026

const PHASES = [
  { id: 1, name: "Base & Foundations", weeks: "1–6", dates: "Jun 22 – Aug 2", color: "#2196f3" },
  { id: 2, name: "Strength & Engine", weeks: "7–12", dates: "Aug 3 – Sep 13", color: "#ff4d00" },
  { id: 3, name: "Race Prep", weeks: "13–18", dates: "Sep 14 – Oct 25", color: "#ffc107" },
  { id: 4, name: "Peak & Race", weeks: "19–21", dates: "Oct 26 – Nov 15", color: "#ff3d00" }
];

const MOTIVATIONAL_QUOTES = [
  { q: "The race is won in training. Every rep today is a second saved on race day.", a: "HYROX Mindset" },
  { q: "You don't rise to the level of competition. You fall to the level of your preparation.", a: "Archilochus" },
  { q: "Discipline is choosing between what you want now and what you want most.", a: "Abraham Lincoln" },
  { q: "The sled doesn't care how tired you are. Train so your legs don't care either.", a: "HYROX Mentality" },
  { q: "Compromised running is where races are won or lost. Embrace the discomfort.", a: "HYROX Training" },
  { q: "8 stations. 8 kilometers. 1 finish line. You're building something unstoppable.", a: "HYROX Cairo" },
  { q: "Trust the process. Trust the taper. Race smart on the day.", a: "Your Program" },
  { q: "Every wall ball, every sled push, every burpee — they're all deposits in your race-day account.", a: "HYROX Prep" },
  { q: "The person who shows up consistently beats the person who shows up intensely.", a: "Training Wisdom" },
  { q: "Cairo is waiting. The first-ever HYROX in Egypt, and you'll be ready.", a: "HYROX Cairo 2026" },
  { q: "Pain is temporary. Your HYROX time is forever.", a: "Race Day Truth" },
  { q: "You're not just training your body. You're training your mind to keep moving when everything says stop.", a: "Mental Toughness" },
];

// Helper to generate dates
function weekStartDate(weekNum) {
  const d = new Date(PROGRAM_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}
function dayDate(weekNum, dayIdx) {
  const d = weekStartDate(weekNum);
  d.setDate(d.getDate() + dayIdx);
  return d;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── FULL WORKOUT DATA ───
// Each week: array of 7 days [Mon..Sun]
// Each day: { title, type, badge, blocks: [{ name, exercises: [string] }] }

function generateAllWeeks() {
  const weeks = [];

  // ══════ PHASE 1: Weeks 1-6 ══════
  // Week 1
  weeks.push([
    { title: "Strength A — Lower Body + Sled Push Skill", type: "strength", badge: "strength", blocks: [
      { name: "Warm-Up", exercises: ["5-8min Daily Short Warm-Up (see Mobility section)"] },
      { name: "Strength", exercises: [
        "Back Squat (or Goblet Squat) — 4×8 @ RPE6 | Rest 90-120s",
        "Romanian Deadlift — 3×8 @ RPE6-7, controlled 3s eccentric | Rest 90s",
        "Walking Lunges (BW → light DB) — 3×12/leg | Rest 60s"
      ]},
      { name: "Station Skill", exercises: [
        "Sled Push technique: 5×20m @ ~50% race weight | Rest 90s | Focus: low shin angle, short choppy steps, arms locked"
      ]},
      { name: "Core", exercises: ["Weighted Plank or Pallof Press — 3×30-40s/side | Rest 45-60s"] }
    ]},
    { title: "Running — Threshold", type: "run", badge: "run", blocks: [
      { name: "Warm-Up", exercises: ["10min easy jog + dynamic mobility"] },
      { name: "Main Set", exercises: ["3×5min @ Threshold, 3min jog recovery"] },
      { name: "Cool-Down", exercises: ["5-10min easy jog/walk"] }
    ]},
    { title: "Strength B — Upper/Pull + SkiErg Skill", type: "strength", badge: "strength", blocks: [
      { name: "Warm-Up", exercises: ["5-8min Daily Short Warm-Up"] },
      { name: "Strength", exercises: [
        "Bent-Over Row or Pull-Up — 4×8 @ RPE6-7 | Rest 90s",
        "DB/BB Shoulder Press — 3×10 @ RPE6-7 | Rest 90s",
        "Dead Hang / Grip Hold — 3×max (cap 45s) | Rest 60s"
      ]},
      { name: "Station Skill", exercises: [
        "SkiErg technique: 4×500m @ controlled/Threshold, hip-hinge drive focus | Rest 90s",
        "Farmers Carry — 4×40m @ ~60% race weight/hand | Rest 60-75s | Tall posture, relaxed grip"
      ]}
    ]},
    { title: "Easy/Long Run + Mobility", type: "run", badge: "run", blocks: [
      { name: "Run", exercises: ["Easy continuous run: 35min Z2"] },
      { name: "Mobility", exercises: ["Full Mobility Flow, 20-30min"] }
    ]},
    { title: "Hybrid Circuit", type: "hybrid", badge: "hybrid", blocks: [
      { name: "Warm-Up", exercises: ["10min easy movement + dynamic mobility"] },
      { name: "Main Set", exercises: ["4 rounds: 250m SkiErg (smooth) + 10 Burpee Broad Jumps + 250m Row | Rest 90s | Moderate effort"] },
      { name: "Cool-Down", exercises: ["5min easy + static stretch"] }
    ]},
    { title: "Mobility & Recovery", type: "mobility", badge: "mobility", blocks: [
      { name: "Session", exercises: ["Full Mobility Flow, 30-40min", "Optional: 20-30min easy walk"] }
    ]},
    { title: "Rest Day", type: "rest", badge: "rest", blocks: [
      { name: "Session", exercises: ["Full rest. No structured training. Light walking/stretching only if desired."] }
    ]}
  ]);

  // Week 2
  weeks.push([
    { title: "Strength A — Lower Body + Sled Push Skill", type: "strength", badge: "strength", blocks: [
      { name: "Warm-Up", exercises: ["5-8min Daily Short Warm-Up"] },
      { name: "Strength", exercises: [
        "Back Squat (or Goblet Squat) — 4×8 @ RPE6 | Rest 90-120s",
        "Romanian Deadlift — 3×8 @ RPE6-7, controlled 3s eccentric | Rest 90s",
        "Walking Lunges (BW → light DB) — 3×12/leg | Rest 60s"
      ]},
      { name: "Station Skill", exercises: ["Sled Push technique: 5×20m @ ~55% race weight | Rest 90s"] },
      { name: "Core", exercises: ["Weighted Plank or Pallof Press — 3×30-40s/side | Rest 45-60s"] }
    ]},
    { title: "Running — Threshold", type: "run", badge: "run", blocks: [
      { name: "Warm-Up", exercises: ["10min easy jog + dynamic mobility"] },
      { name: "Main Set", exercises: ["4×5min @ Threshold, 2:30 jog recovery"] },
      { name: "Cool-Down", exercises: ["5-10min easy jog/walk"] }
    ]},
    { title: "Strength B — Upper/Pull + SkiErg Skill", type: "strength", badge: "strength", blocks: [
      { name: "Warm-Up", exercises: ["5-8min Daily Short Warm-Up"] },
      { name: "Strength", exercises: [
        "Bent-Over Row or Pull-Up — 4×8 @ RPE6-7 | Rest 90s",
        "DB/BB Shoulder Press — 3×10 @ RPE6-7 | Rest 90s",
        "Dead Hang / Grip Hold — 3×max (cap 45s) | Rest 60s"
      ]},
      { name: "Station Skill", exercises: [
        "SkiErg: 4×500m @ controlled/Threshold | Rest 90s",
        "Farmers Carry — 4×40m @ ~65% race weight/hand | Rest 60-75s"
      ]}
    ]},
    { title: "Easy/Long Run + Mobility", type: "run", badge: "run", blocks: [
      { name: "Run", exercises: ["Easy continuous run: 38min Z2"] },

//  STATE
// ═══════════════════════════════════════════
const STATE_KEY = 'hyrox_cairo_state';
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    return s || { completed: {}, benchmarks: {}, selectedPhase: 0 };
  } catch { return { completed: {}, benchmarks: {}, selectedPhase: 0 }; }
}
function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
function dayKey(week, day) { return `w${week}d${day}`; }
function isCompleted(week, day) { return !!state.completed[dayKey(week, day)]; }
function toggleComplete(week, day) {
  const k = dayKey(week, day);
  state.completed[k] = !state.completed[k];
  saveState();
}

//  NAVIGATION
// ═══════════════════════════════════════════
let currentPage = 'today';
let viewingWeek = null;
let viewingDay = null;

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    navigateTo(btn.dataset.page);
  });
});

function navigateTo(page) {
  currentPage = page;
  viewingWeek = null;
  viewingDay = null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  document.getElementById('workout-overlay').style.display = 'none';
  renderPage(page);
  window.scrollTo(0, 0);
}

function renderPage(page) {
  switch(page) {
    case 'today': renderToday(); break;
    case 'program': renderProgram(); break;
    case 'guide': renderGuide(); break;
    case 'progress': renderProgress(); break;
  }
}

function renderToday() {
  const now = new Date();
  const hour = now.getHours();
  let greeting = hour < 12 ? "Good Morning" : hour < 17 ? "Good Afternoon" : "Good Evening";
  document.getElementById('hero-greeting').textContent = greeting;
  document.getElementById('hero-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Countdown
  const diff = RACE_DATE - now;
  const days = Math.max(0, Math.floor(diff / 86400000));
  const weeks = Math.floor(days / 7);
  const remDays = days % 7;
  const totalWorkouts = Object.keys(state.completed).filter(k => state.completed[k]).length;
  document.getElementById('countdown').innerHTML = `
    <div class="countdown-item"><div class="countdown-num">${days}</div><div class="countdown-label">Days</div></div>
    <div class="countdown-item"><div class="countdown-num">${weeks}</div><div class="countdown-label">Weeks</div></div>
    <div class="countdown-item"><div class="countdown-num">${remDays}</div><div class="countdown-label">Rem Days</div></div>
    <div class="countdown-item"><div class="countdown-num">${totalWorkouts}</div><div class="countdown-label">Done</div></div>
  `;

  // Motivation
  const qIdx = Math.floor(now.getTime() / 86400000) % MOTIVATIONAL_QUOTES.length;
  const q = MOTIVATIONAL_QUOTES[qIdx];
  document.getElementById('motivation-slot').innerHTML = `
    <div class="motivation-card">
      <div class="motivation-quote">"${q.q}"</div>
      <div class="motivation-attr">— ${q.a}</div>
    </div>
  `;

  // Find today's workout
  const daysSinceStart = Math.floor((now - PROGRAM_START) / 86400000);
  const currentWeek = Math.floor(daysSinceStart / 7);
  const currentDay = daysSinceStart % 7;
  const todayEl = document.getElementById('today-workout');

  if (currentWeek < 0) {
    todayEl.innerHTML = `<div class="today-card"><div class="today-phase">PROGRAM STARTS SOON</div>
      <div class="today-day">Training begins ${fmtDate(PROGRAM_START)}</div>
      <div class="today-type">Get your equipment ready and review the Guide section</div></div>`;
    return;
  }
  if (currentWeek >= 21) {
    todayEl.innerHTML = `<div class="today-card"><div class="today-phase">PROGRAM COMPLETE</div>
      <div class="today-day">You've crossed the finish line!</div>
      <div class="today-type">Check your progress and celebrate your journey</div></div>`;
    return;
  }

  const workout = ALL_WEEKS[currentWeek][currentDay];
  const phaseIdx = currentWeek < 6 ? 0 : currentWeek < 12 ? 1 : currentWeek < 18 ? 2 : 3;
  const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  const completed = isCompleted(currentWeek, currentDay);

  todayEl.innerHTML = `
    <div class="today-card" onclick="showWorkout(${currentWeek}, ${currentDay})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

      <div class="today-type">${fmtDate(dayDate(currentWeek + 1, currentDay))}</div>
      <div class="today-preview" style="margin-top:12px">
        ${workout.blocks.map(b => b.exercises[0]).slice(0, 2).join('<br>')}
        ${workout.blocks.length > 2 ? '<br><span style="color:var(--orange)">Tap to see full workout →</span>' : ''}
      </div>
      ${completed ? '<div style="margin-top:12px;color:var(--green);font-weight:700">✓ Completed</div>' : ''}
    </div>
    ${currentDay < 6 ? (() => {
      const tmrw = ALL_WEEKS[currentWeek][currentDay + 1];
      return `<div style="font-size:12px;color:var(--text2);font-weight:600;margin:12px 0 6px">TOMORROW</div>
        <div class="today-card" onclick="showWorkout(${currentWeek}, ${currentDay + 1})" style="opacity:0.7">
          <div style="display:flex;justify-content:space-between;align-items:center">

            <span class="badge badge-${tmrw.badge}">${tmrw.type}</span>
          </div>

    })() : ''}
  `;
}

//  WORKOUT DETAIL
// ═══════════════════════════════════════════
function showWorkout(weekIdx, dayIdx) {
  viewingWeek = weekIdx;
  viewingDay = dayIdx;
  const workout = ALL_WEEKS[weekIdx][dayIdx];
  const phaseIdx = weekIdx < 6 ? 0 : weekIdx < 12 ? 1 : weekIdx < 18 ? 2 : 3;
  const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  const completed = isCompleted(weekIdx, dayIdx);

  let html = `
    <button class="back-btn" onclick="closeWorkout()">← Back</button>
    <div class="workout-header">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="today-phase">PHASE ${phaseIdx + 1} — WEEK ${weekIdx + 1}</div>
        <span class="badge badge-${workout.badge}">${workout.type}</span>
      </div>
      <div style="font-size:22px;font-weight:800;margin-bottom:4px">${dayNames[dayIdx]}</div>
      <div style="font-size:16px;font-weight:600;color:var(--text2)">${workout.title}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">${fmtDate(dayDate(weekIdx + 1, dayIdx))}</div>
    </div>
  `;

  workout.blocks.forEach(block => {
    html += `<div class="workout-block">
      <div class="workout-block-title">${block.name}</div>
      ${block.exercises.map(ex => {
        const parts = ex.split(' | ');
        let exHtml = `<div class="exercise"><div>${parts[0]}</div>`;
        if (parts[1]) exHtml += `<div class="exercise-rest">${parts.slice(1).join(' | ')}</div>`;
        exHtml += '</div>';
        return exHtml;
      }).join('')}
    </div>`;
  });

  html += `<button class="complete-btn ${completed ? 'done' : ''}" onclick="markComplete(${weekIdx}, ${dayIdx})">
    ${completed ? '✓ COMPLETED — TAP TO UNDO' : 'MARK AS COMPLETE'}
  </button>`;

  document.getElementById('workout-detail-content').innerHTML = html;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('workout-overlay').style.display = 'block';
  document.getElementById('workout-overlay').classList.add('active');
  window.scrollTo(0, 0);
}

function closeWorkout() {
  document.getElementById('workout-overlay').style.display = 'none';
  document.getElementById(`page-${currentPage}`).classList.add('active');
  renderPage(currentPage);
}

function markComplete(weekIdx, dayIdx) {
  toggleComplete(weekIdx, dayIdx);
  showWorkout(weekIdx, dayIdx);
}

//  PROGRAM PAGE
// ═══════════════════════════════════════════
function renderProgram() {
  const sel = document.getElementById('phase-selector');
  sel.innerHTML = PHASES.map((p, i) => `
    <div class="phase-pill ${state.selectedPhase === i ? 'active' : ''}" onclick="selectPhase(${i})">
      Phase ${p.id}: ${p.name}
    </div>
  `).join('');

  renderPhaseContent();
}

function selectPhase(idx) {
  state.selectedPhase = idx;
  saveState();
  renderProgram();
}

function renderPhaseContent() {
  const phase = PHASES[state.selectedPhase];
  const startWeek = [0, 6, 12, 18][state.selectedPhase];
  const endWeek = [6, 12, 18, 21][state.selectedPhase];
  const content = document.getElementById('program-content');

  if (viewingWeek !== null && !viewingDay && viewingDay !== 0) {
    renderWeekDetail(viewingWeek);
    return;
  }

  let html = `<div style="font-size:13px;color:var(--text2);margin-bottom:16px">${phase.dates}</div>`;

  for (let w = startWeek; w < endWeek; w++) {
    const weekDays = ALL_WEEKS[w];
    const completedCount = weekDays.filter((_, d) => isCompleted(w, d)).length;
    const dayNames = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    const now = new Date();
    const daysSinceStart = Math.floor((now - PROGRAM_START) / 86400000);
    const currentWeek = Math.floor(daysSinceStart / 7);
    const currentDay = daysSinceStart % 7;

    html += `<div class="week-card" onclick="openWeek(${w})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="week-title">Week ${w + 1}</div>
        <div style="font-size:12px;color:var(--text2)">${completedCount}/7</div>
      </div>
      <div class="week-dates">${fmtDate(weekStartDate(w + 1))} — ${fmtDate(dayDate(w + 1, 6))}</div>
      <div class="week-days">
        ${dayNames.map((dn, i) => {
          let cls = 'week-day-dot';
          if (isCompleted(w, i)) cls += ' completed';
          else if (w === currentWeek && i === currentDay) cls += ' today';
          return `<div class="${cls}">${dn}</div>`;
        }).join('')}
      </div>
    </div>`;
  }

  content.innerHTML = html;
}

function openWeek(weekIdx) {
  viewingWeek = weekIdx;
  const content = document.getElementById('program-content');
  const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  const weekDays = ALL_WEEKS[weekIdx];

  let html = `<button class="back-btn" onclick="viewingWeek=null;renderPhaseContent()">← All Weeks</button>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">Week ${weekIdx + 1}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${fmtDate(weekStartDate(weekIdx + 1))} — ${fmtDate(dayDate(weekIdx + 1, 6))}</div>
  `;

  weekDays.forEach((day, i) => {
    const completed = isCompleted(weekIdx, i);
    html += `<div class="day-row" onclick="showWorkout(${weekIdx}, ${i})">
      <div class="day-num ${completed ? 'completed' : ''}">${dayNames[i][0]}</div>
      <div class="day-info">
        <div class="day-name">${dayNames[i]}</div>
        <div class="day-desc">${day.title}</div>
      </div>
      <span class="badge badge-${day.badge}" style="flex-shrink:0">${day.type}</span>
      ${completed ? '<div class="day-check">✓</div>' : ''}
    </div>`;
  });

  content.innerHTML = html;
}

// ═══════════════════════════════════════════
//  GUIDE PAGE
// ═══════════════════════════════════════════
function renderGuide() {
  const list = document.getElementById('guide-list');
  const detail = document.getElementById('guide-detail');

  if (detail.style.display === 'block') return;

  list.style.display = 'block';
  list.innerHTML = GUIDES.map((g, i) => `
    <div class="guide-card" onclick="openGuide(${i})">
      <div class="guide-card-icon">${g.icon}</div>
      <div class="guide-card-title">${g.title}</div>
      <div class="guide-card-desc">${g.desc}</div>
    </div>
  `).join('');
}

function openGuide(idx) {
  const g = GUIDES[idx];
  document.getElementById('guide-list').style.display = 'none';
  const detail = document.getElementById('guide-detail');
  detail.style.display = 'block';
  detail.innerHTML = `
    <button class="back-btn" onclick="closeGuide()">← All Guides</button>
    <div style="font-size:20px;font-weight:800;margin-bottom:16px">${g.title}</div>
    <div class="guide-content">${g.content}</div>
  `;
  window.scrollTo(0, 0);
}

function closeGuide() {
  document.getElementById('guide-list').style.display = 'block';
  document.getElementById('guide-detail').style.display = 'none';
}

// ═══════════════════════════════════════════
//  PROGRESS PAGE
// ═══════════════════════════════════════════
function renderProgress() {
  const totalDays = 21 * 7;
  const completedDays = Object.keys(state.completed).filter(k => state.completed[k]).length;
  const pct = Math.round((completedDays / totalDays) * 100);
  const circumference = 2 * Math.PI * 65;
  const offset = circumference - (pct / 100) * circumference;

  // Stats
  const now = new Date();
  const daysSinceStart = Math.max(0, Math.floor((now - PROGRAM_START) / 86400000));
  const currentWeek = Math.min(21, Math.floor(daysSinceStart / 7) + 1);
  const streakDays = calculateStreak();

  const benchmarks = [
    { key: 'run2k', label: '2km Run Time Trial' },
    { key: 'row1k', label: '1000m Row Time' },
    { key: 'sledPush', label: 'Sled Push 50m @ Race Weight' },
    { key: 'sledPull', label: 'Sled Pull 50m @ Race Weight' },
    { key: 'wallBalls', label: 'Max Unbroken Wall Balls' },
    { key: 'simTotal', label: 'Full HYROX Sim — Total Time' },
  ];

  document.getElementById('progress-content').innerHTML = `
    <div class="progress-ring">
      <div class="progress-circle">
        <svg viewBox="0 0 140 140" width="160" height="160">
          <circle class="bg" cx="70" cy="70" r="65" fill="none" stroke-width="8"/>
          <circle class="fill" cx="70" cy="70" r="65" fill="none" stroke-width="8"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div class="progress-label">${completedDays} of ${totalDays} sessions completed</div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${currentWeek}</div><div class="stat-label">Current Week</div></div>
      <div class="stat-card"><div class="stat-num">${streakDays}</div><div class="stat-label">Day Streak</div></div>
      <div class="stat-card"><div class="stat-num">${Math.max(0, Math.floor((RACE_DATE - now) / 86400000))}</div><div class="stat-label">Days to Race</div></div>
      <div class="stat-card"><div class="stat-num">${completedDays}</div><div class="stat-label">Workouts Done</div></div>
    </div>

    <div class="section-title" style="font-size:16px">Benchmark Tracking</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Track at end of Phase 1, mid Phase 3, and race week</div>

    ${benchmarks.map(b => {
      const vals = state.benchmarks[b.key] || {};
      return `<div class="benchmark-card">
        <div class="benchmark-title">${b.label}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          <div>
            <div style="font-size:10px;color:var(--text2);margin-bottom:4px">Week 6/7</div>
            <input class="benchmark-input" placeholder="—" value="${vals.p1 || ''}"
              onchange="saveBenchmark('${b.key}','p1',this.value)">
          </div>
          <div>
            <div style="font-size:10px;color:var(--text2);margin-bottom:4px">Week 16</div>
            <input class="benchmark-input" placeholder="—" value="${vals.p3 || ''}"
              onchange="saveBenchmark('${b.key}','p3',this.value)">
          </div>
          <div>
            <div style="font-size:10px;color:var(--text2);margin-bottom:4px">Week 19</div>
            <input class="benchmark-input" placeholder="—" value="${vals.p4 || ''}"
              onchange="saveBenchmark('${b.key}','p4',this.value)">
          </div>
        </div>
      </div>`;
    }).join('')}
  `;
}

function saveBenchmark(key, phase, value) {
  if (!state.benchmarks[key]) state.benchmarks[key] = {};
  state.benchmarks[key][phase] = value;
  saveState();
}

function calculateStreak() {
  const now = new Date();
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const daysSinceStart = Math.floor((d - PROGRAM_START) / 86400000);
    if (daysSinceStart < 0) break;
    const w = Math.floor(daysSinceStart / 7);
    const day = daysSinceStart % 7;
    if (w >= 21) continue;
    if (isCompleted(w, day)) streak++;
    else if (i > 0) break;
  }
  return streak;
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderToday();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
